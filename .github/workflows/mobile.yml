name: Mobile Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - android
          - ios

permissions:
  contents: write
  packages: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.platform != 'ios' }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_ENABLE_LICENSE_KEY: ${{ secrets.VITE_ENABLE_LICENSE_KEY }}

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Decode signing keystore
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/release.keystore

      - name: Decode Play service account JSON
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}" > android/play-service-account.json

      - name: Build Android AAB (Release)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/frontend/android/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Publish to Play Store (Internal)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd android
          chmod +x gradlew
          ./gradlew publishBundle
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ github.workspace }}/frontend/android/play-service-account.json

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: cityflow-debug.apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release AAB
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: cityflow-release.aab
          path: frontend/android/app/build/outputs/bundle/release/app-release.aab

  build-ios:
    runs-on: macos-latest
    if: ${{ github.event.inputs.platform != 'android' }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_ENABLE_LICENSE_KEY: ${{ secrets.VITE_ENABLE_LICENSE_KEY }}

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Import Code Signing Certificate
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12

          echo -n "$IOS_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$IOS_KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$IOS_KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH \
            -P "$IOS_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k $KEYCHAIN_PATH

          security set-key-partition-list -S apple-tool:,apple: \
            -k "$IOS_KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install Provisioning Profile
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo -n "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PROFILE_PATH
          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(security cms -D -i $PROFILE_PATH))
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PROFILE_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision

      - name: Set Team ID
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          sed -i '' 's/YOUR_TEAM_ID/${{ secrets.IOS_TEAM_ID }}/g' ios/App/exportOptions.plist

      - name: Build iOS Archive
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd ios/App
          xcodebuild -scheme App -sdk iphoneos -configuration Release \
            -archivePath build/App.xcarchive archive

      - name: Export IPA
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd ios/App
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath build/

      - name: Upload iOS Archive
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: cityflow-ios
          path: frontend/ios/App/build/App.ipa

      - name: Upload to TestFlight
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          npx ios-cli upload \
            --path ios/App/build/App.ipa \
            --api-key-id "$APP_STORE_CONNECT_API_KEY_ID" \
            --api-issuer-id "$APP_STORE_CONNECT_API_ISSUER_ID" \
            --api-key "$APP_STORE_CONNECT_API_KEY" || \
          echo "ios-cli not available, upload manually via Transporter or App Store Connect"

  release:
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cityflow-debug.apk/app-debug.apk
            cityflow-release.aab/app-release.aab
            cityflow-ios/App.ipa
          generate_release_notes: true
