name: Frontend Tests

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'frontend/**'
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'frontend/**'

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npm run test

      - run: npm run build
