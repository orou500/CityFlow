<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CityFlow - Global Real Estate Simulation</title>
    <link rel="icon" type="image/png" href="/images/favicon.png" />
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('cityflow-theme') || 'system';
          if (theme === 'system') {
            theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          }
        } catch(e) {}
      })();
    </script>
    <script>
      (function() {
        var observer = new MutationObserver(function() {
          if (document.body) {
            document.body.classList.remove('trigger-position-left');
            document.body.classList.add('trigger-position-right');
            observer.disconnect();
          }
        });
        observer.observe(document.documentElement, { childList: true, subtree: true });
      })();
    </script>
    <style>
      .enable-accessibility-badge, .enable-accessibility-info, [class*="enable-license"], [class*="enable-branding"] {
        display: none !important;
      }
      #enable-toolbar-trigger {
        right: 16px !important;
        left: auto !important;
      }
    </style>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
