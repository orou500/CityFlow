apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cityflow-mongodb
  namespace: cityflow
  labels:
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/part-of: cityflow
spec:
  serviceName: cityflow-mongodb
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mongodb
      app.kubernetes.io/part-of: cityflow
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mongodb
        app.kubernetes.io/part-of: cityflow
    spec:
      containers:
        - name: mongodb
          image: mongo:7
          ports:
            - containerPort: 27017
              name: mongodb
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mongodb-credentials
                  key: username
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-credentials
                  key: password
            - name: MONGO_INITDB_DATABASE
              value: cityflow
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            exec:
              command:
                - mongosh
                - -u
                - $(MONGO_INITDB_ROOT_USERNAME)
                - -p
                - $(MONGO_INITDB_ROOT_PASSWORD)
                - --authenticationDatabase
                - admin
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - mongosh
                - -u
                - $(MONGO_INITDB_ROOT_USERNAME)
                - -p
                - $(MONGO_INITDB_ROOT_PASSWORD)
                - --authenticationDatabase
                - admin
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
  volumeClaimTemplates:
    - metadata:
        name: mongodb-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
