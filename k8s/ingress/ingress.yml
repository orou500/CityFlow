apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cityflow-ingress
  namespace: cityflow
  labels:
    app.kubernetes.io/part-of: cityflow
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$1
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    # Uncomment and set after installing cert-manager:
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - cityflow.sizops.co.il
      secretName: cityflow-tls
  rules:
    - host: cityflow.sizops.co.il
      http:
        paths:
          - path: /api/(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: cityflow-backend
                port:
                  number: 5000
          - path: /uploads/(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: cityflow-backend
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cityflow-frontend
                port:
                  number: 80
