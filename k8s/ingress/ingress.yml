apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cityflow-ingress
  namespace: cityflow
  labels:
    app.kubernetes.io/part-of: cityflow
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: cityflow-strip-api-prefix@kubernetescrd
    traefik.ingress.kubernetes.io/service.sticky.cookie: "false"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - cityflow.sizops.co.il
      secretName: cityflow-tls
  rules:
    - host: cityflow.sizops.co.il
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: cityflow-backend
                port:
                  number: 5000
          - path: /uploads
            pathType: Prefix
            backend:
              service:
                name: cityflow-backend
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cityflow-frontend
                port:
                  number: 80
