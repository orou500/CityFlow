apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: discord-bot
  namespace: cityflow
  labels:
    app.kubernetes.io/name: discord-bot
    app.kubernetes.io/part-of: cityflow
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: discord-bot
  policyTypes:
    - Egress
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow HTTPS to Discord API (gateway + REST)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
    # Allow internal cluster access (MongoDB, backend API)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: cityflow
