apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cityflow-backups
  namespace: cityflow
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: cityflow
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
